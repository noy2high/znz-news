<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZNZ | News Trading Database</title>
    <link rel="icon" type="image/png" href="favicon.png">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        znz: {
                            bg: '#000000',
                            card: '#0D0E12',
                            border: '#1E2028',
                            purple: '#6366F1',
                            green: '#22C55E',
                            red: '#EF4444',
                            text: '#F3F4F6',
                            muted: '#9CA3AF'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #000000;
            color: #F3F4F6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Helvetica, Arial, sans-serif;
        }

        /* 100% Height Side Glow for News Cards */
        .glow-card-side {
            position: relative;
            overflow: hidden;
        }
        .glow-card-side::after {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            right: 0;
            width: 4px;
            background: linear-gradient(180deg, #6366F1 0%, #a855f7 100%);
            border-top-right-radius: 0.75rem;
            border-bottom-right-radius: 0.75rem;
            box-shadow: -4px 0 22px 6px rgba(99, 102, 241, 0.95);
        }

        /* Bottom Edge Glow - Green (Winrate) */
        .glow-bottom-green {
            position: relative;
            overflow: hidden;
        }
        .glow-bottom-green::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: #22C55E;
            border-bottom-left-radius: 0.75rem;
            border-bottom-right-radius: 0.75rem;
            box-shadow: 0 -4px 22px 6px rgba(34, 197, 94, 0.95);
        }

        /* Bottom Edge Glow - Red (Streak) */
        .glow-bottom-red {
            position: relative;
            overflow: hidden;
        }
        .glow-bottom-red::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: #EF4444;
            border-bottom-left-radius: 0.75rem;
            border-bottom-right-radius: 0.75rem;
            box-shadow: 0 -4px 22px 6px rgba(239, 68, 68, 0.95);
        }
    </style>
</head>
<body class="min-h-screen p-4 sm:p-8 max-w-5xl mx-auto">

    <!-- Header Navigation -->
    <header class="flex justify-between items-center pb-6 mb-8 border-b border-znz-border">
        <div class="flex items-center gap-3">
            <img src="logo.png" alt="ZNZ Logo" class="w-9 h-9 rounded-md object-contain" onerror="this.style.display='none'">
            <div>
                <h1 class="text-lg font-bold tracking-tight text-white leading-none">ZNZ</h1>
                <p class="text-xs text-znz-muted mt-1">News Trading Database</p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <!-- Circular XAUUSD Logo -->
            <img src="xauusd.png" alt="XAUUSD" class="w-5 h-5 rounded-full object-cover" onerror="this.style.display='none'">
            <span class="px-3 py-1 text-xs font-medium rounded-full bg-znz-card border border-znz-border text-znz-muted flex items-center gap-2">
                <span class="relative flex h-2 w-2">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-znz-green opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-2 w-2 bg-znz-green"></span>
                </span>
                Live Tracked
            </span>
        </div>
    </header>

    <!-- Top KPI Summary Section -->
    <section class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-10">
        
        <!-- Winrate (Bottom Green Glow) -->
        <div class="glow-bottom-green bg-znz-card border border-znz-border rounded-xl p-5 flex flex-col items-center justify-center text-center">
            <p class="text-xs font-semibold uppercase tracking-wider text-znz-muted mb-1">WINRATE</p>
            <p id="stat-winrate" class="text-3xl font-extrabold text-white">0%</p>
        </div>

        <!-- Wins Box -->
        <div class="bg-znz-card border border-znz-border rounded-xl p-5 flex flex-col items-center justify-center text-center">
            <p class="text-xs font-semibold uppercase tracking-wider text-znz-muted mb-1">WINS</p>
            <p id="stat-wins" class="text-3xl font-extrabold text-znz-green">0</p>
        </div>

        <!-- Losses Box -->
        <div class="bg-znz-card border border-znz-border rounded-xl p-5 flex flex-col items-center justify-center text-center">
            <p class="text-xs font-semibold uppercase tracking-wider text-znz-muted mb-1">LOSSES</p>
            <p id="stat-losses" class="text-3xl font-extrabold text-znz-red">0</p>
        </div>

        <!-- Streak (Bottom Red Glow) -->
        <div class="glow-bottom-red bg-znz-card border border-znz-border rounded-xl p-5 flex flex-col items-center justify-center text-center">
            <p class="text-xs font-semibold uppercase tracking-wider text-znz-muted mb-1">STREAK</p>
            <p id="stat-streak" class="text-3xl font-extrabold text-white">0 Streak</p>
        </div>

    </section>

    <!-- Upcoming News Section -->
    <section class="mb-10">
        <div class="flex items-center gap-2 mb-4">
            <div class="w-1 h-4 bg-znz-purple rounded-full"></div>
            <h2 class="text-sm font-bold uppercase tracking-wider text-znz-muted">Upcoming News</h2>
        </div>
        <div id="upcoming-container" class="space-y-3">
            <div class="text-xs text-znz-muted py-4 text-center">Loading upcoming news...</div>
        </div>
    </section>

    <!-- Past News Section -->
    <section>
        <div class="flex items-center gap-2 mb-4">
            <div class="w-1 h-4 bg-znz-muted rounded-full"></div>
            <h2 class="text-sm font-bold uppercase tracking-wider text-znz-muted">Past News</h2>
        </div>
        <div id="past-container" class="space-y-3">
            <div class="text-xs text-znz-muted py-4 text-center">Loading past news...</div>
        </div>
    </section>

    <script src="app.js"></script>
</body>
</html>
