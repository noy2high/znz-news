<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZNZ | News Trading Database</title>
    <link rel="icon" type="image/png" href="favicon.png">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        znz: {
                            bg: '#000000',
                            card: '#0D0E12',
                            border: '#1E2028',
                            purple: '#6366F1',
                            purpleGlow: '#4F46E5',
                            green: '#22C55E',
                            red: '#EF4444',
                            text: '#F3F4F6',
                            muted: '#9CA3AF'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #000000;
            color: #F3F4F6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Helvetica, Arial, sans-serif;
        }

        /* Purplish-Blue Side Glow Bar (from reference UI) */
        .glow-card {
            position: relative;
            overflow: hidden;
        }
        .glow-card::after {
            content: '';
            position: absolute;
            top: 15%;
            right: 0;
            height: 70%;
            width: 4px;
            background: linear-gradient(180deg, #6366F1 0%, #a855f7 100%);
            border-top-left-radius: 4px;
            border-bottom-left-radius: 4px;
            box-shadow: -2px 0 14px 2px rgba(99, 102, 241, 0.85);
        }
    </style>
</head>
<body class="min-h-screen p-4 sm:p-8 max-w-5xl mx-auto">

    <!-- Header Navigation -->
    <header class="flex justify-between items-center pb-6 mb-8 border-b border-znz-border">
        <div class="flex items-center gap-3">
            <img src="logo.png" alt="ZNZ Logo" class="w-9 h-9 rounded-md object-contain" onerror="this.style.display='none'">
            <div>
                <h1 class="text-lg font-bold tracking-tight text-white leading-none">ZNZ</h1>
                <p class="text-xs text-znz-muted mt-1">News Trading Database</p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <img src="xauusd.png" alt="XAUUSD" class="w-5 h-5 object-contain" onerror="this.style.display='none'">
            <span class="px-3 py-1 text-xs font-medium rounded-full bg-znz-card border border-znz-border text-znz-muted flex items-center gap-2">
                <span class="relative flex h-2 w-2">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-znz-green opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-2 w-2 bg-znz-green"></span>
                </span>
                Live Tracked
            </span>
        </div>
    </header>

    <!-- Top KPI Summary -->
    <section class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-10">
        <div class="bg-znz-card border border-znz-border rounded-xl p-5">
            <p class="text-xs font-semibold uppercase tracking-wider text-znz-muted mb-1">Winrate</p>
            <p id="stat-winrate" class="text-3xl font-extrabold text-znz-green">0%</p>
        </div>
        <div class="bg-znz-card border border-znz-border rounded-xl p-5">
            <p class="text-xs font-semibold uppercase tracking-wider text-znz-muted mb-1">Wins | Losses</p>
            <p id="stat-wins-losses" class="text-3xl font-extrabold text-white">6 | 0</p>
        </div>
        <div class="bg-znz-card border border-znz-border rounded-xl p-5">
            <p class="text-xs font-semibold uppercase tracking-wider text-znz-muted mb-1">Streak</p>
            <p id="stat-streak" class="text-3xl font-extrabold text-white">0 Streak</p>
        </div>
    </section>

    <!-- Upcoming News Section -->
    <section class="mb-10">
        <div class="flex items-center gap-2 mb-4">
            <div class="w-1 h-4 bg-znz-purple rounded-full"></div>
            <h2 class="text-sm font-bold uppercase tracking-wider text-znz-muted">Upcoming News</h2>
        </div>
        <div id="upcoming-container" class="space-y-3">
            <div class="text-xs text-znz-muted py-4 text-center">Loading upcoming news...</div>
        </div>
    </section>

    <!-- Past News Section -->
    <section>
        <div class="flex items-center gap-2 mb-4">
            <div class="w-1 h-4 bg-znz-muted rounded-full"></div>
            <h2 class="text-sm font-bold uppercase tracking-wider text-znz-muted">Past News</h2>
        </div>
        <div id="past-container" class="space-y-3">
            <div class="text-xs text-znz-muted py-4 text-center">Loading past news...</div>
        </div>
    </section>

    <script src="app.js"></script>
</body>
</html>
